<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>to our</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <h1>Welcome <br>To Our <br>Platform!</h1>

    <p id="description">Join our community <br>and enjoy exclusive <br>features!</p>

    <h2>Ready to get <br> Started? Join Now!</h2>

    <div>
        <form action="">
          <option value="Language"></option>
            <i class="fa-solid fa-earth-americas" style="color: rgb(255, 255, 255);"></i><select name="Language" id="Language">
              <option value="English"></i>English</option>
              <option value="Spanish">Spanish</option>
              <option value="French">French</option>
              <option value="German">German</option>
            </select> 
          </option>
          <h3>Get Started!</h3>

          <label for="Username">
            <i class="fa-solid fa-user" style="color: rgb(255, 255, 255);"></i>
            <input type="text" id="Username" name="Username" required placeholder="Username">
          </label>
          <label for="email">
            <i class="fa-solid fa-envelope" style="color: rgb(255, 255, 255);"></i>
            <input type="email" id="email" name="email" required placeholder="Enter your email">
          </label>
          <label for="password">
            <i class="fa-solid fa-lock" style="color: rgb(255, 255, 255);"></i>
            <input type="password" id="password" name="password" required placeholder="Enter your password">
          </label>
          <label for="confirm-password">
            <i class="fa-solid fa-eye" style="color: rgb(255, 255, 255);"></i>
            <input type="password" id="confirm-password" name="confirm-password" required placeholder="Confirm your password">
          </label>

          <label for="terms" id="terms-label">
            <input type="checkbox" id="terms" name="terms" required>
            I have read and agree to the <a href="">Terms and Conditions</a>
          </label>

          <button type="submit">Sign Up</button>
          <br>
          <hr>
          <p id="or">Or</p>

          <button type="button" id="google">
            <i class="fa-brands fa-google" style="color: rgb(255, 255, 255);"></i>
            Continue with Google
          </button>
        </form>
    </div>
</body>
</html>
