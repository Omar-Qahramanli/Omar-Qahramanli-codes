<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Code</title>

  <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

  <div class="container">

    <div class="image-box">
      <img src="Nümunə foto.jpg" alt="">
    </div>

    <div class="card">
      <h1>
        Live.<br>
        Love.<br>
        <span>Decorate..</span>
      </h1>

      <p>
       Evinizi daha rahat və gözəl etmək üçün ilhamverici dekorasiya həlləri.
      </p>

      <div class="feature">
        <div class="icon purple"><i class="fa-solid fa-couch" style="color: rgb(122, 126, 255);"></i></div>

        <div>
          <h3>Modern Desingn</h3>
          <small>Zövqlü və müasir interyer üslubları.</small>
        </div>
      </div>

      <div class="feature">
        <div class="icon green"><i class="fa-brands fa-envira fa-flip-horizontal" style="color: rgb(105, 189, 145);"></i></div>

        <div>
          <h3> Natural Materials
</h3>
          <small>Təbii və keyfiyyətli materiallardan istifade.  </small>
        </div>
      </div>

      <div class="feature">
        <div class="icon yellow"><i class="fa-solid fa-heart" style="color: rgb(255, 184, 55);"></i></div>

        <div>
          <h3>Cozy Atmosphere</h3>
          <small>Rahat və isti bir ev mühiti yaradın.</small>
        </div>
      </div>

    </div>

  </div>

</body>
</html>
