<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Instagram</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="main-wrapper">
        
        <div class="intro-box">
            <div class="white-square">
                <i class="fab fa-instagram"></i>
            </div>
            <h1>Instagram</h1>
            <p>36 screens</p>
        </div>

        <div class="display-area">
            
            <div class="mobile-frame">
                <div class="top-info">9:41 <span><i class="fas fa-signal"></i> <i class="fas fa-battery-full"></i></span></div>
                <div class="nav-bar"><strong>jacob_w</strong></div>
                
                <div class="profile-body">
                    <div class="profile-header">
                        <img src="https://picsum.photos/id/64/80/80" class="circle">
                        <div class="stat-box"><b>54</b> Posts</div>
                        <div class="stat-box"><b>834</b> Followers</div>
                    </div>
                    <div class="bio-box">
                        <b>Jacob West</b>
                        <p>Digital designer @pixsellz</p>
                    </div>
                    <button class="action-btn">Edit Profile</button>
                </div>

                <div class="stories-bar">
                    <div class="s-unit"><div class="s-circle">+</div><span>New</span></div>
                    <div class="s-unit"><img src="https://picsum.photos/id/10/50/50" class="s-circle"><span>Friends</span></div>
                    <div class="s-unit"><img src="https://picsum.photos/id/20/50/50" class="s-circle"><span>Sport</span></div>
                </div>
                
                <div class="image-grid">
                    <img src="https://picsum.photos/id/1/100/100">
                    <img src="https://picsum.photos/id/2/100/100">
                    <img src="https://picsum.photos/id/3/100/100">
                </div>
            </div>

            <div class="mobile-frame">
                <div class="top-info">9:41 <span><i class="fas fa-signal"></i> <i class="fas fa-battery-full"></i></span></div>
                <div class="feed-nav">
                    <i class="fas fa-camera"></i> <b>Instagram</b> <i class="fas fa-paper-plane"></i>
                </div>
                
                <div class="stories-bar">
                    <div class="s-unit"><img src="https://picsum.photos/id/64/50/50" class="s-circle ring"><span>Your Story</span></div>
                    <div class="s-unit"><img src="https://picsum.photos/id/1027/50/50" class="s-circle live"><span>karenne</span></div>
                    <div class="s-unit"><img src="https://picsum.photos/id/1012/50/50" class="s-circle ring"><span>zackjohn</span></div>
                </div>

                <div class="post-box">
                    <div class="post-header">
                        <img src="https://picsum.photos/id/177/30/30" class="circle">
                        <b>joshua_l</b>
                    </div>
                    <img src="https://picsum.photos/id/1039/300/300" class="post-main-img">
                </div>
            </div>

        </div>
    </div>

</body>
</html>
</body>
</html>
