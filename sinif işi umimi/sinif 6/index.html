<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <form>
        <label>Name:</label>
        <input type="text" placeholder="Adınızı daxil edin">

        <label>Surname:</label>
        <input type="text" placeholder="Soyadınızı daxil edin">

        <label>Age:</label>
        <input type="number" placeholder="Yaşınız">

        <label>Password</label>
        <input type="password" placeholder="Şifrənizi daxil edin">

        <label>Email</label>
        <input type="email">

        <div class="buttons">
            <button type="submit">Yadda saxla</button>
            <button type="reset">Sıfırla</button>
        </div>
    </form>
</div>

</body>
</html>
