<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title> Table</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>Expense</th>
            </tr>
        </thead>

        <tbody>
            <tr>
                <td>Arun</td>
                <td>$10</td>
            </tr>
            <tr>
                <td>Priya</td>
                <td>$8</td>
            </tr>
        </tbody>

        <tfoot>
            <tr>
                <td>Sum:</td>
                <td>$18</td>
            </tr>
        </tfoot>
    </table>

</body>
</html>
