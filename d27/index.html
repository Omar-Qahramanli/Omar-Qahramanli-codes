<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cancellation Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>Cancellation Request Form</h1>

    <form>
        <div class="row">
            <div class="input-group">
                <label>First Name</label>
                <input type="text">
            </div>
            <div class="input-group">
                <label>Last Name</label>
                <input type="text">
            </div>
        </div>

        <div class="input-group">
            <label>Email Address</label>
            <input type="email">
        </div>

        <div class="input-group">
            <label>Phone number</label>
            <input type="text">
        </div>

        <div class="input-group">
            <label>Product / Service to be Canceled</label>
            <input type="text">
        </div>

        <div class="input-group">
            <label>Reason for Cancellation</label>
            <textarea></textarea>
        </div>

        <div class="input-group">
            <label>Effective from</label>
            <input type="date">
        </div>

        <div class="input-group">
            <label>How can we contact you?</label>
            <select>
                <option>Select</option>
                <option>Email</option>
                <option>Phone</option>
            </select>
        </div>

        <div class="input-group">
            <label>Signature</label>
            <textarea></textarea>
        </div>

        <button type="submit">Submit</button>
    </form>
</div>

</body>
</html>
